<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonne journée</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --z:       #8B3E2F;
      --z2:      #C47A60;
      --z-bg:    #FAF0EB;
      --z-light: #F5D9CC;
      --n:       #2B5F6B;
      --n2:      #5A9EAB;
      --n-bg:    #EAF4F6;
      --n-light: #C3E0E8;
      --ink:     #1C1814;
      --muted:   #7A6E66;
      --paper:   #F8F3EC;
      --rule:    #D8CFBF;
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      opacity: 0.07;
      background-image:
        repeating-linear-gradient(0deg,   transparent, transparent 79px, var(--z) 79px, var(--z) 80px),
        repeating-linear-gradient(90deg,  transparent, transparent 79px, var(--n) 79px, var(--n) 80px);
    }

    .page {
      position: relative; z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }

    header {
      background: var(--ink);
      text-align: center;
      padding: 2.4vh 2rem 2vh;
    }

    .header-sub {
      font-style: italic; font-weight: 300;
      font-size: clamp(0.6rem, 1.4vw, 0.75rem);
      letter-spacing: 0.2em;
      color: #B8A898;
      margin-bottom: 0.35em;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      letter-spacing: 0.28em;
      color: var(--paper);
    }

    .header-rule {
      height: 1px;
      background: linear-gradient(90deg, transparent, #5A5048 20%, #5A5048 80%, transparent);
      margin-top: 1.4vh;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      overflow: hidden;
    }

    .col-divider {
      background: linear-gradient(180deg, transparent, var(--rule) 10%, var(--rule) 90%, transparent);
    }

    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(0.8vh, 1.4vh, 12px);
      padding: 2vh 2vw 1.5vh;
    }

    .col-z { background: linear-gradient(160deg, var(--z-bg) 0%, var(--paper) 65%); }
    .col-n { background: linear-gradient(200deg, var(--n-bg) 0%, var(--paper) 65%); }

    /* avatar */
    .avatar {
      width: clamp(38px, 5vw, 52px);
      height: clamp(38px, 5vw, 52px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.9rem, 1.8vw, 1.15rem);
      font-weight: 500;
    }
    .av-z { background: var(--z-light); color: var(--z); }
    .av-n { background: var(--n-light); color: var(--n); }

    /* types (bonne / mauvaise) */
    .types { display: flex; gap: 1.2vw; align-items: flex-start; }
    .type  { display: flex; flex-direction: column; align-items: center; gap: 0.5vh; }

    .type-lbl {
      font-style: italic; font-weight: 300;
      font-size: clamp(0.6rem, 1.3vw, 0.72rem);
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .type-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 1.8vw, 1.1rem);
      font-weight: 400; line-height: 1;
    }
    .col-z .type-count { color: var(--z); }
    .col-n .type-count { color: var(--n); }

    .btn-row { display: flex; gap: 0.5vw; }

    .btn {
      width:  clamp(34px, 4.5vw, 46px);
      height: clamp(34px, 4.5vw, 46px);
      border-radius: 50%;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, transform .12s;
    }
    .col-z .btn { border-color: var(--z2); color: var(--z); }
    .col-z .btn:hover { background: var(--z-light); }
    .col-n .btn { border-color: var(--n2); color: var(--n); }
    .col-n .btn:hover { background: var(--n-light); }
    .btn:active { transform: scale(0.9); }

    .type-vsep {
      width: 1px; min-height: 72px;
      background: var(--rule);
      align-self: stretch;
      margin: 0 0.3vw;
    }

    /* streak */
    .streak {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: clamp(4px, 0.6vh, 8px) 1vw;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: rgba(255,255,255,0.5);
      min-width: clamp(80px, 14vw, 120px);
    }

    .streak-num {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(1.2rem, 3.5vw, 2.6rem);
      line-height: 1;
    }

    .streak-dots { display: flex; gap: 4px; align-items: center; min-height: 8px; }

    .streak-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    .col-z .streak-num.good { color: var(--z); }
    .col-z .streak-num.bad  { color: var(--z2); }
    .col-n .streak-num.good { color: var(--n); }
    .col-n .streak-num.bad  { color: var(--n2); }
    .streak-num.empty       { color: var(--rule); }

    .streak-lbl {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(0.6rem, 1.2vw, 0.72rem);
      letter-spacing: 0.07em;
      color: var(--muted);
      text-align: center;
    }

    .streak-num.pop { animation: pop .3s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }

    /* chart */
    .chart-wrap {
      width: 100%;
      margin-top: 10px;
      border-top: 1px solid var(--rule);
      padding-top: 8px;
    }

    .chart {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(10px, 2.5vw, 22px);
      height: 60px;
      padding: 0 8px;
      overflow: hidden;
    }

    .bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: clamp(28px, 6vw, 46px);
    }

    .bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      transition: height .4s cubic-bezier(.4,0,.2,1);
      min-height: 3px;
    }

    .chart-labels {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 2.5vw, 22px);
      padding: 4px 8px 0;
    }

    .chart-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: clamp(28px, 6vw, 46px);
    }

    .bar-val { font-size: clamp(0.6rem, 1.1vw, 0.72rem); color: var(--muted); line-height: 1; }
    .bar-lbl { font-style: italic; font-size: clamp(0.58rem, 1vw, 0.68rem); color: var(--muted); line-height: 1; }

    .col-z .bar.good { background: var(--z); }
    .col-z .bar.bad  { background: var(--z-light); border: 1px solid var(--z2); }
    .col-n .bar.good { background: var(--n); }
    .col-n .bar.bad  { background: var(--n-light); border: 1px solid var(--n2); }

    .col-total {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(0.65rem, 1.2vw, 0.78rem);
      color: var(--muted);
      opacity: 0.65;
      margin-top: 2px;
      text-align: center;
    }

    .bump { animation: bump .3s cubic-bezier(.34,1.56,.64,1); }
    .dip  { animation: dip  .22s ease; }
    @keyframes bump { 0%{transform:scale(1)} 45%{transform:scale(1.12)} 100%{transform:scale(1)} }
    @keyframes dip  { 0%{transform:scale(1)} 40%{transform:scale(0.87)} 100%{transform:scale(1)} }

    /* footer */
    footer {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8vh 1.5rem 1.5vh;
      border-top: 1px solid var(--rule);
      background: var(--paper);
    }

    .footer-lbl {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.48rem, 0.9vw, 0.56rem);
      letter-spacing: 0.22em;
      color: var(--muted);
      opacity: 0.7;
    }

    .footer-total {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(0.9rem, 1.8vw, 1.1rem);
      color: var(--muted);
      opacity: 0.8;
    }

    .footer-status {
      font-style: italic;
      font-size: clamp(0.5rem, 0.9vw, 0.6rem);
      color: var(--muted);
      opacity: .5;
      min-height: 1em;
      margin-left: 0.3rem;
    }

    /* popup */
    .popup-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(28,24,20,0.38);
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
    }
    .popup-overlay.show { opacity: 1; pointer-events: all; }

    .popup {
      position: relative;
      max-width: min(380px, 88vw);
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 2.2rem 2rem 1.6rem;
      text-align: center;
      transform: translateY(18px) scale(0.96);
      transition: transform .3s cubic-bezier(.34,1.36,.64,1), opacity .25s ease;
      opacity: 0;
    }
    .popup-overlay.show .popup { transform: translateY(0) scale(1); opacity: 1; }

    .popup-accent {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .popup-msg {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(1.15rem, 2.8vw, 1.4rem);
      line-height: 1.55;
      color: var(--ink);
    }

    .popup-rule {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
      margin: 1.2rem 0 1rem;
    }

    .popup-close {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      background: none; border: none;
      cursor: pointer;
      padding: 0.3rem 0.8rem;
      text-transform: uppercase;
      transition: color .15s;
    }
    .popup-close:hover { color: var(--ink); }

    .popup-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-bottom: 0.8rem;
    }
    .dot-good-z { background: var(--z); }
    .dot-bad-z  { background: var(--z-light); border: 1px solid var(--z2); }
    .dot-good-n { background: var(--n); }
    .dot-bad-n  { background: var(--n-light); border: 1px solid var(--n2); }
  </style>
</head>
<body>

<div class="page">

  <header>
    <div class="header-sub">— journal des journées —</div>
    <h1>Bonne journée</h1>
    <div class="header-rule"></div>
  </header>

  <main class="columns">

    <!-- Z -->
    <section class="col col-z">
      <div class="avatar av-z">Z</div>

      <div class="types">
        <div class="type">
          <div class="type-lbl">bonne</div>
          <div class="type-count" id="count-zg">0</div>
          <div class="btn-row">
            <button class="btn" onclick="change('z','g',-1)" aria-label="Moins bonne journée Z">−</button>
            <button class="btn" onclick="change('z','g',+1)" aria-label="Plus bonne journée Z">+</button>
          </div>
        </div>
        <div class="type-vsep"></div>
        <div class="type">
          <div class="type-lbl">mauvaise</div>
          <div class="type-count" id="count-zb">0</div>
          <div class="btn-row">
            <button class="btn" onclick="change('z','b',-1)" aria-label="Moins mauvaise journée Z">−</button>
            <button class="btn" onclick="change('z','b',+1)" aria-label="Plus mauvaise journée Z">+</button>
          </div>
        </div>
      </div>

      <div class="streak" id="streak-z">
        <div class="streak-dots" id="dots-z"></div>
        <div class="streak-num empty" id="snum-z">—</div>
        <div class="streak-lbl" id="slbl-z">série de suite</div>
      </div>

      <div class="chart-wrap">
        <div class="chart">
          <div class="bar-group">
            <div class="bar good" id="bar-zg" style="height:3px"></div>
          </div>
          <div class="bar-group">
            <div class="bar bad" id="bar-zb" style="height:3px"></div>
          </div>
        </div>
        <div class="chart-labels">
          <div class="chart-label">
            <div class="bar-val" id="bv-zg">0</div>
            <div class="bar-lbl">☀︎</div>
          </div>
          <div class="chart-label">
            <div class="bar-val" id="bv-zb">0</div>
            <div class="bar-lbl">☁︎</div>
          </div>
        </div>
        <div class="col-total" id="total-z">—</div>
      </div>
    </section>

    <div class="col-divider"></div>

    <!-- N -->
    <section class="col col-n">
      <div class="avatar av-n">N</div>

      <div class="types">
        <div class="type">
          <div class="type-lbl">bonne</div>
          <div class="type-count" id="count-ng">0</div>
          <div class="btn-row">
            <button class="btn" onclick="change('n','g',-1)" aria-label="Moins bonne journée N">−</button>
            <button class="btn" onclick="change('n','g',+1)" aria-label="Plus bonne journée N">+</button>
          </div>
        </div>
        <div class="type-vsep"></div>
        <div class="type">
          <div class="type-lbl">mauvaise</div>
          <div class="type-count" id="count-nb">0</div>
          <div class="btn-row">
            <button class="btn" onclick="change('n','b',-1)" aria-label="Moins mauvaise journée N">−</button>
            <button class="btn" onclick="change('n','b',+1)" aria-label="Plus mauvaise journée N">+</button>
          </div>
        </div>
      </div>

      <div class="streak" id="streak-n">
        <div class="streak-dots" id="dots-n"></div>
        <div class="streak-num empty" id="snum-n">—</div>
        <div class="streak-lbl" id="slbl-n">série de suite</div>
      </div>

      <div class="chart-wrap">
        <div class="chart">
          <div class="bar-group">
            <div class="bar good" id="bar-ng" style="height:3px"></div>
          </div>
          <div class="bar-group">
            <div class="bar bad" id="bar-nb" style="height:3px"></div>
          </div>
        </div>
        <div class="chart-labels">
          <div class="chart-label">
            <div class="bar-val" id="bv-ng">0</div>
            <div class="bar-lbl">☀︎</div>
          </div>
          <div class="chart-label">
            <div class="bar-val" id="bv-nb">0</div>
            <div class="bar-lbl">☁︎</div>
          </div>
        </div>
        <div class="col-total" id="total-n">—</div>
      </div>
    </section>

  </main>

  <footer>
    <span class="footer-lbl">Total</span>
    <span class="footer-total" id="total"> </span>
    <span class="footer-lbl">journées</span>
    <span class="footer-status" id="status">Chargement…</span>
  </footer>

</div>

<!-- POPUP -->
<div class="popup-overlay" id="overlay" onclick="closePopup(event)">
  <div class="popup" id="popup">
    <span class="popup-dot" id="popup-dot"></span>
    <span class="popup-accent" id="popup-accent"></span>
    <p class="popup-msg" id="popup-msg"></p>
    <div class="popup-rule"></div>
    <button class="popup-close" onclick="hidePopup()">Fermer</button>
  </div>
</div>

<script>
  /* ── state ── */
  const state = { z: { g: 0, b: 0 }, n: { g: 0, b: 0 } };
  const MAX_H = 70;

  /* ── streak history (localStorage, per device) ── */
  function loadHist(p)   { try { return JSON.parse(localStorage.getItem('hist-'+p) || '[]'); } catch(e) { return []; } }
  function saveHist(p,h) { try { localStorage.setItem('hist-'+p, JSON.stringify(h)); } catch(e) {} }

  const hist = { z: loadHist('z'), n: loadHist('n') };

  function computeStreak(h) {
    if (!h.length) return { count: 0, type: null };
    const last = h[h.length - 1];
    let count = 0;
    for (let i = h.length - 1; i >= 0 && h[i] === last; i--) count++;
    return { count, type: last };
  }

  function renderStreak(p) {
    const s      = computeStreak(hist[p]);
    const numEl  = document.getElementById('snum-' + p);
    const lblEl  = document.getElementById('slbl-' + p);
    const dotsEl = document.getElementById('dots-' + p);

    if (s.count === 0) {
      numEl.textContent = '—';
      numEl.className   = 'streak-num empty';
      lblEl.textContent = 'série de suite';
      dotsEl.innerHTML  = '';
      return;
    }

    numEl.textContent = s.count;
    numEl.className   = 'streak-num ' + (s.type === 'g' ? 'good' : 'bad');

    const plural = s.count > 1 ? 's' : '';
    lblEl.textContent = (s.type === 'g' ? 'bonne' : 'mauvaise') + plural + ' de suite';

    const col    = s.type === 'g'
      ? (p === 'z' ? 'var(--z)' : 'var(--n)')
      : (p === 'z' ? 'var(--z-light)' : 'var(--n-light)');
    const border = s.type === 'b'
      ? (p === 'z' ? '1px solid var(--z2)' : '1px solid var(--n2)')
      : 'none';
    const shown  = Math.min(s.count, 6);
    dotsEl.innerHTML = Array.from({ length: shown }, (_, i) => {
      const op = (i === shown - 1 && s.count > shown) ? 'opacity:.35;' : '';
      return `<div class="streak-dot" style="background:${col};border:${border};${op}"></div>`;
    }).join('');

    numEl.classList.remove('pop');
    void numEl.offsetWidth;
    numEl.classList.add('pop');
    numEl.addEventListener('animationend', () => numEl.classList.remove('pop'), { once: true });
  }

      "Mauvaise journée, mais bonne résilience.",
      "Ça ne durera pas — les mauvaises journées n'ont jamais le dernier mot.",
      "Même dans les jours difficiles, quelque chose tient.",
      "Ce soir, pose tout ça et dors.",
    ],
    minus: [
      "On efface, on recommence.",
      "Une correction dans le grand cahier.",
      "Retour en arrière autorisé.",
      "Les erreurs aussi font partie du compte.",
      "Ce n'était peut-être pas si sûr, après tout.",
      "On peut toujours revenir sur ses pas.",
      "Le crayon a une gomme pour une bonne raison.",
      "Tout peut se réviser.",
    ],
  };

  function pickMsg(pool) { return pool[Math.floor(Math.random() * pool.length)]; }

  /* ── popup ── */
  let popupTimer = null;

  function showPopup(person, type, delta) {
    const dot    = document.getElementById('popup-dot');
    const accent = document.getElementById('popup-accent');
    const msg    = document.getElementById('popup-msg');

    let pool, dotClass, accentText;
    if (delta < 0) {
      pool       = MSGS.minus;
      dotClass   = type === 'g' ? 'dot-good-' + person : 'dot-bad-' + person;
      accentText = '— correction —';
    } else if (type === 'g') {
      pool       = MSGS.good;
      dotClass   = 'dot-good-' + person;
      accentText = person === 'z' ? '— Z · bonne journée —' : '— N · bonne journée —';
    } else {
      pool       = MSGS.bad;
      dotClass   = 'dot-bad-' + person;
      accentText = person === 'z' ? '— Z · mauvaise journée —' : '— N · mauvaise journée —';
    }

    dot.className      = 'popup-dot ' + dotClass;
    accent.textContent = accentText;
    msg.textContent    = pickMsg(pool);

    document.getElementById('overlay').classList.add('show');
    if (popupTimer) clearTimeout(popupTimer);
    popupTimer = setTimeout(hidePopup, 4800);
  }

  function hidePopup() {
    document.getElementById('overlay').classList.remove('show');
    if (popupTimer) { clearTimeout(popupTimer); popupTimer = null; }
  }

  function closePopup(e) {
    if (e.target === document.getElementById('overlay')) hidePopup();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') hidePopup(); });

  /* ── render ── */
  function barH(v, mx) { return mx ? Math.max(3, Math.round(v / mx * MAX_H)) : 3; }

  function render() {
    const vals = [state.z.g, state.z.b, state.n.g, state.n.b];
    const mx   = Math.max(...vals, 1);

    [['zg', state.z.g], ['zb', state.z.b], ['ng', state.n.g], ['nb', state.n.b]].forEach(([k, v]) => {
      document.getElementById('count-' + k).textContent = v;
      document.getElementById('bv-'    + k).textContent = v;
      document.getElementById('bar-'   + k).style.height = barH(v, mx) + 'px';
    });

    const tz = state.z.g + state.z.b;
    const tn = state.n.g + state.n.b;
    document.getElementById('total-z').textContent = tz + ' journée' + (tz > 1 ? 's' : '');
    document.getElementById('total-n').textContent = tn + ' journée' + (tn > 1 ? 's' : '');
    document.getElementById('total').textContent   = vals.reduce((a, b) => a + b, 0);
  }

  /* ── change ── */
  function change(person, type, delta) {
    const prev = state[person][type];
    state[person][type] = Math.max(0, prev + delta);
    if (state[person][type] === prev && delta < 0) return;

    render();
    save();
    showPopup(person, type, delta);

    /* update streak history */
    if (delta > 0) {
      hist[person].push(type);
      if (hist[person].length > 60) hist[person].shift();
    } else {
      hist[person].pop();
    }
    saveHist(person, hist[person]);
    renderStreak(person);

    /* bar bump animation */
    const barEl = document.getElementById('bar-' + person + type);
    barEl.classList.remove('bump', 'dip');
    void barEl.offsetWidth;
    barEl.classList.add(delta > 0 ? 'bump' : 'dip');
    barEl.addEventListener('animationend', () => barEl.classList.remove('bump', 'dip'), { once: true });
  }

  /* ── server ── */
  async function load() {
    try {
      const res  = await fetch('/api/counters');
      const data = await res.json();
      state.z.g = data.zg ?? 0;
      state.z.b = data.zb ?? 0;
      state.n.g = data.ng ?? 0;
      state.n.b = data.nb ?? 0;
      render();
      renderStreak('z');
      renderStreak('n');
      setStatus('');
    } catch(e) {
      setStatus('Erreur de connexion');
    }
  }

  async function save() {
    try {
      const res = await fetch('/api/counters', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zg: state.z.g, zb: state.z.b, ng: state.n.g, nb: state.n.b })
      });
      if (!res.ok) throw new Error();
      setStatus('');
    } catch(e) {
      setStatus('Erreur de sauvegarde');
    }
  }

  function setStatus(msg) { document.getElementById('status').textContent = msg; }

  load();
</script>

</body>
</html>
